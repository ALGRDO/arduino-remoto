services:
  - type: web
    name: arduino-remoto
    env: node
    plan: free
    region: ohio
    nodeVersion: 18
    buildCommand: 'cd server && npm install && node install-cli.js'
    startCommand: 'cd server && node server.js'
    envVars:
      - key: BASIC_AUTH_USER
        value: admin
      - key: BASIC_AUTH_PASS
        generateValue: true
